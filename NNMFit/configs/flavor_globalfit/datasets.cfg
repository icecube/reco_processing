#############################################################
# Part 4: Dataset Variables                                 #
# Definitions and key names of the variables to be saved    #
# to the dataframes                                         #
# Each Selection needs these blocks:                        #
# [{name}_reco_vars] : variables from the reconstructions   #
# [{name}_mc_vars] : collects the headers for all           #
#                    simulation types                       #
#                    e.g. Nugen =    {name}_mc_vars_nugen   #
#                         CORSIKA =  {name}_mc_vars_corsika #
#                         MuonGun =  {name}_mc_vars_muongun #
# [{name}_mc_vars_{sim}] : MC variables from the simulation #
#############################################################

#
# Cascade Selection
#

[IC86_pass2_SnowStorm_cscd_reco_vars]
