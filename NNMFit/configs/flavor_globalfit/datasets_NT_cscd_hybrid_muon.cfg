# NNMFit Datasets Configuration File
# Contains several sections:
# 1. Flux definitions (=info for flux weighting during dataframe creation)
# 2. Detector configurations (= settings for individual dataframes)
# 3. Dataset definitions (= settings for individual iceprod datasets)
# 4. Parameter definitions (= key names to be saved to dataframes)

###########################################################
#  Part 1: Flux definitions                               #
#  & file paths for pre-calculated atmospheric splines    #
###########################################################

[fluxes]
astro = powerlaw
atmo = mceq_conv_H4a_SIBYLL23c, mceq_conv_GST4_SIBYLL23c, barr_h_mceq_H4a_SIBYLL23c, barr_w_mceq_H4a_SIBYLL23c, barr_y_mceq_H4a_SIBYLL23c, barr_z_mceq_H4a_SIBYLL23c
prompt = mceq_pr_H4a_SIBYLL23c, mceq_pr_GST4_SIBYLL23c, barr_h_mceq_pr_H4a_SIBYLL23c, barr_w_mceq_pr_H4a_SIBYLL23c, barr_z_mceq_pr_H4a_SIBYLL23c, barr_y_mceq_pr_H4a_SIBYLL23c
muon = muongun_conv_H4a_SIBYLL, muongun_pr_H4a_DPMJETc
common = fluxless_weight
corsika = corsika_H4a

#
# common
#

[fluxless_weight]
flux = fluxless_weight
class = powerlaw
const = 1.0
index = 0
mc_type = NuGen

#
# astro
#

[powerlaw]
flux = powerlaw
class = powerlaw
const = 1E-8
index = 2
mc_type = NuGen

#
# atmo
#

[mceq_conv_H4a_SIBYLL23c]
flux = mceq_conv_H4a_SIBYLL23c
class = mceq_spline
spline_file = /data/ana/Diffuse/NNMFit/MCEq_splines/v1.2.1/MCEq_splines_PRI-Gaisser-H4a_INT-SIBYLL23c_allfluxes.pickle
mceq_keys = conv_antinumu, conv_numu, conv_antinue, conv_nue, conv_antinutau, conv_nutau
mc_type = NuGen

[mceq_conv_GST4_SIBYLL23c]
flux = mceq_conv_GST4_SIBYLL23c
class = mceq_spline
spline_file = /data/ana/Diffuse/NNMFit/MCEq_splines/v1.2.1/MCEq_splines_PRI-GST-4gen_INT-SIBYLL23c_allfluxes.pickle
mceq_keys = conv_antinumu, conv_numu, conv_antinue, conv_nue, conv_antinutau, conv_nutau
mc_type = NuGen

## barr
[barr_h_mceq_H4a_SIBYLL23c]
spline_file = /data/ana/Diffuse/NNMFit/MCEq_splines/v1.2.1/barr_gradients/Barr_gradients_PRI-Gaisser-H4a_INT-SIBYLL23C.pickle
flux = barr_h_mceq_H4a_SIBYLL23c
class = mceq_barr_spline
barr_key = h+, h-
mceq_keys = conv_antinumu, conv_numu, conv_antinue, conv_nue
#, conv_antinutau, conv_nutau
mc_type = NuGen

[barr_y_mceq_H4a_SIBYLL23c]
