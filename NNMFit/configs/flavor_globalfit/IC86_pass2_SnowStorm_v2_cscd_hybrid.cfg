[IC86_pass2_SnowStorm_v2_cscd_hybrid]
name = IC86_pass2_SnowStorm_v2_cscd_hybrid
datasets_path = ${main:dir_datasets}/SnowStorm_cscd_hybrid_baseline_FTP_MSUangsens
baseline_dataset = ${datasets_path}
systematics = ${name}_systematics
var_mapping = ${name}_var_mapping
var_mapping_mc = ${name}_var_mapping_mc
analysis_binning = ${name}_2D_binning
data = /data/ana/Diffuse/GlobalFit/NNMFit/datasets/data/data_cscd_hybrid_wCoords.parquet
livetime = 330315015.11
modification_hooks =

# philipp
# excluded_components = muontemplate, conventional, prompt

# needs conventional_veto_globalfit, prompt_veto_globalfit, muon, astro. Remove all HESE components
