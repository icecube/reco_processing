###
### astro
###
astro:
  baseline_weights: powerlaw
  class: Powerlaw
  parameters: [astro_norm, gamma_astro, astro_nue_ratio, astro_nutau_ratio, inel_scale]
  param_specifications:
    inel_scale:
      inelasticity_table: &inelasticity_table /data/ana/Diffuse/NNMFit/resources/inelasticity_tables/NuGen_xsection_fits.json

###
### atmospheric
###

#
# HESE
#
prompt_hese:
   baseline_weights: &prompt_base_weights mceq_pr_H4a_SIBYLL23c
   additional:
      fixed_passing_fraction_per_event: PassRate_prompt
   class: AtmoFixedVeto
   parameters: [prompt_norm, delta_gamma, CR_grad,inel_scale]
   param_specifications:
     delta_gamma:
       baseline_weights: *prompt_base_weights
     CR_grad:
       baseline_weights: *prompt_base_weights
       alternative_weights: mceq_pr_GST4_SIBYLL23c
     inel_scale:
       inelasticity_table: *inelasticity_table

conventional_hese:
  baseline_weights: &conv_base_weights mceq_conv_H4a_SIBYLL23c
  additional:
     fixed_passing_fraction_per_event: PassRate_conv
  class: AtmoFixedVeto
  parameters: [conv_norm, delta_gamma, CR_grad, barr_h, barr_w, barr_z, barr_y,inel_scale]
  param_specifications:
    delta_gamma:
      baseline_weights: *conv_base_weights
    CR_grad:
      baseline_weights: *conv_base_weights
      alternative_weights: mceq_conv_GST4_SIBYLL23c
    barr_h:
      baseline_weights: *conv_base_weights
      slope_per_event: barr_h_mceq_H4a_SIBYLL23c
    barr_y:
      baseline_weights: *conv_base_weights
      slope_per_event: barr_y_mceq_H4a_SIBYLL23c
    barr_w:
      baseline_weights: *conv_base_weights
      slope_per_event: barr_w_mceq_H4a_SIBYLL23c
    barr_z:
      baseline_weights: *conv_base_weights
      slope_per_event: barr_z_mceq_H4a_SIBYLL23c
    inel_scale:
      inelasticity_table: *inelasticity_table

#
# Globalfit
# 
conventional_globalfit:
  # baseline_weights: &conv_base_weights mceq_conv_H4a_SIBYLL23c
  # TODO: Is this correct to point to the same baseline weights?
  baseline_weights: *conv_base_weights
  class: ConventionalAtmo
  parameters: [conv_norm, delta_gamma, CR_grad, barr_h, barr_w, barr_z, barr_y]
  param_specifications:
    delta_gamma:
      baseline_weights: *conv_base_weights
    CR_grad:
      baseline_weights: *conv_base_weights
      alternative_weights: &conv_cr_grad_alt mceq_conv_GST4_SIBYLL23c
    barr_h:
      baseline_weights: *conv_base_weights
      slope_per_event: &conv_barr_h barr_h_mceq_H4a_SIBYLL23c
    barr_y:
      baseline_weights: *conv_base_weights
      slope_per_event: &conv_barr_y barr_y_mceq_H4a_SIBYLL23c
    barr_w:
      baseline_weights: *conv_base_weights
      slope_per_event: &conv_barr_w barr_w_mceq_H4a_SIBYLL23c
    barr_z:
      baseline_weights: *conv_base_weights
      slope_per_event: &conv_barr_z barr_z_mceq_H4a_SIBYLL23c
  additional:
    hooks:
      OscillationsHook:
        spline_file: /data/ana/Diffuse/NNMFit/resources/oscillation_splines/NuCraft_OscillationProb.pickle

prompt_globalfit:
  # baseline_weights: &prompt_base_weights mceq_pr_H4a_SIBYLL23c
  # TODO: Is this correct to point to the same baseline weights?
  baseline_weights: *prompt_base_weights
  class: PromptAtmo
  parameters: [prompt_norm, delta_gamma, CR_grad]
  param_specifications:
    delta_gamma:
      baseline_weights: *prompt_base_weights
    CR_grad:
      baseline_weights: *prompt_base_weights
      alternative_weights: &pr_cr_grad_alt mceq_pr_GST4_SIBYLL23c
  additional:
    hooks:
      OscillationsHook:
        spline_file: /data/ana/Diffuse/NNMFit/resources/oscillation_splines/NuCraft_OscillationProb.pickle

conventional_veto_globalfit:
  baseline_weights: *conv_base_weights
  class: ConventionalAtmo
  parameters: [conv_norm, delta_gamma, CR_grad, barr_h, barr_w, barr_z, barr_y, effective_veto]
  param_specifications:
    delta_gamma:
      baseline_weights: *conv_base_weights
    CR_grad:
      baseline_weights: *conv_base_weights
      alternative_weights: *conv_cr_grad_alt
    barr_h:
      baseline_weights: *conv_base_weights
      slope_per_event: *conv_barr_h
    barr_y:
      baseline_weights: *conv_base_weights
      slope_per_event: *conv_barr_y
    barr_w:
      baseline_weights: *conv_base_weights
      slope_per_event: *conv_barr_w
    barr_z:
      baseline_weights: *conv_base_weights
      slope_per_event: *conv_barr_z
    effective_veto:
      threshold_a: log_PF_at100GeV_conv_a
      threshold_b: log_PF_at100GeV_conv_b
      threshold_c: log_PF_at100GeV_conv_c

prompt_veto_globalfit:
  baseline_weights: *prompt_base_weights
  class: PromptAtmo
  parameters: [prompt_norm, delta_gamma, CR_grad, effective_veto]
  param_specifications:
    delta_gamma:
      baseline_weights: *prompt_base_weights
    CR_grad:
      baseline_weights: *prompt_base_weights
      alternative_weights: *pr_cr_grad_alt
    effective_veto:
      threshold_a: log_PF_at100GeV_pr_a
      threshold_b: log_PF_at100GeV_pr_b
      threshold_c: log_PF_at100GeV_pr_c

###
### atmospheric muons
###


muon:
  baseline_weights: muongun_conv_H4a_SIBYLL
  class: ConventionalAtmo
  parameters: [muongun_norm]
  skip_syst: True


#
# HESE
#
muontemplate_hese:
  class: TemplateFlux
  parameters: [muongun_norm]
  skip_syst: True
  additional:
    template_file: /data/ana/Diffuse/GlobalFit_Flavor/NNMFit_Configs/override/MuonGun/Tracks_KDE.pickle

#
# globalfit
#
muontemplate_track_globalfit:
  class: TemplateFlux
  parameters: [muon_norm]
  skip_syst: True
  additional:
    template_file: /data/ana/Diffuse/GlobalFit/NNMFit/templates/Tracks_CorsikaMuon_Fullrange_drop_5lowEbins.pickle

muontemplate_cascade_globalfit:
  class: TemplateFlux
  parameters: [muongun_norm]
  skip_syst: True
  additional:
    template_file: /data/ana/Diffuse/GlobalFit/NNMFit/templates/cscd_muongun_ALL_KDE_manual_ssq.pickle